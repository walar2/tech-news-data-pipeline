x-airflow-common: &airflow-common
  build: .
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env

  environment:
    AIRFLOW__SMTP__SMTP_HOST: ${AIRFLOW__SMTP__SMTP_HOST}
    AIRFLOW__SMTP__SMTP_STARTTLS: ${AIRFLOW__SMTP__SMTP_STARTTLS}
    AIRFLOW__SMTP__SMTP_SSL: ${AIRFLOW__SMTP__SMTP_SSL}
    AIRFLOW__SMTP__SMTP_PORT: ${AIRFLOW__SMTP__SMTP_PORT}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${AIRFLOW__SMTP__SMTP_MAIL_FROM}
    AIRFLOW__SMTP__SMTP_USER: ${AIRFLOW__SMTP__SMTP_USER}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${AIRFLOW__SMTP__SMTP_PASSWORD}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC

    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}

    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}

    AIRFLOW_CONN_TECH_NEWS_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/tech_news
    AIRFLOW_CONN_AIRFLOW_DB: postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}

    AIRFLOW_VAR_HACKERNEWS_BASE_URL: ${HACKERNEWS_BASE_URL}
    AIRFLOW_VAR_DEVTO_BASE_URL: ${DEVTO_BASE_URL}
    AIRFLOW_VAR_ALERT_SLACK_WEBHOOK: ${ALERT_SLACK_WEBHOOK:-}
    AIRFLOW_VAR_DEVTO_LATEST_PAGES: ${DEVTO_LATEST_PAGES:-5}
    AIRFLOW_VAR_DEVTO_CONCURRENCY: ${DEVTO_CONCURRENCY:-10}




    PYTHONPATH: /opt/airflow/src:/opt/airflow/plugins

  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./sql:/opt/airflow/sql
    - ./logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d

    ports:
      - "5432:5432"

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common

    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email admin@example.com || true

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data: